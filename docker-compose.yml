version: "3.9"

services:
  open-codex:
    build: .
    container_name: open-codex
    ports:
      - "8000:8000"
    environment:
      # ── LLM Provider config (uncomment / fill as needed) ──
      # Ollama local — point to host machine's Ollama daemon
      # OLLAMA_HOST: http://host.docker.internal:11434
      #
      # Ollama Cloud
      # OLLAMA_API_KEY: ""
      #
      # LM Studio — point to host machine's LM Studio server
      # LMSTUDIO_HOST: http://host.docker.internal:1234
      #
      # Gemini
      # GEMINI_API_KEY: ""
      #
      # Joomla MCP (optional)
      # JOOMLA_BASE_URL: ""
      # JOOMLA_BEARER_TOKEN: ""
      # JOOMLA_AI_PROVIDER: gemini
      #
      # YOO Builder MySQL (optional)
      # YOOMYSQL_HOST: ""
      # YOOMYSQL_USER: ""
      # YOOMYSQL_PASSWORD: ""
      # YOOMYSQL_DATABASE: ""
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
