version: "3.9"

services:
  ocodx:
    build: .
    container_name: ocodx-slm-matrix
    image: ocodx:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These can be overridden in .env
      PYTHONUNBUFFERED: "1"
      # For AionUI Browser (AI on UI)
      PLAYWRIGHT_HEADLESS: "true"
    volumes:
      # Persist OCODX projects, threads, and matrix states
      - ocodx_data:/root/.open_codex
      # Optional: Mount your local workspace for OCODX to work on
      # - .:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ocodx_data:
    driver: local
